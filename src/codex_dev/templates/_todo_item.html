<article class="todo-item {% if todo.done %}is-done{% endif %}">
  <form class="toggle-form" action="{{ url_for('toggle_todo', todo_id=todo.id) }}" method="post">
    <input
      aria-label="Mark {{ todo.title }} complete"
      name="done"
      type="checkbox"
      onchange="this.form.submit()"
      {% if todo.done %}checked{% endif %}
    >
  </form>
  <div class="todo-content">
    <form class="edit-form" action="{{ url_for('update_todo', todo_id=todo.id) }}" method="post">
      <label class="sr-only" for="title-{{ todo.id }}">Task title</label>
      <input id="title-{{ todo.id }}" name="title" type="text" value="{{ todo.title }}" required>
      <label class="sr-only" for="priority-{{ todo.id }}">Priority</label>
      <select id="priority-{{ todo.id }}" name="priority" aria-label="Priority">
        {% for priority in priorities %}
          <option value="{{ priority }}" {% if priority == todo.priority %}selected{% endif %}>{{ priority }}</option>
        {% endfor %}
      </select>
      <button class="save-button" type="submit">Save</button>
    </form>
    <div class="todo-meta">
      <span class="priority priority-{{ todo.priority | lower }}">{{ todo.priority }}</span>
      {{ todo_timestamp(todo) }}
    </div>
  </div>
  <form action="{{ url_for('remove_todo', todo_id=todo.id) }}" method="post">
    <button class="icon-button" type="submit" aria-label="Delete {{ todo.title }}" title="Delete">
      &times;
    </button>
  </form>
</article>
